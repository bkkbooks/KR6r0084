body:
  text: 京兆崇福寺僧沙門法藏集書寫第九雜述第十書寫第九魏安豐王延明中山王凞釋德圓釋法誠釋修德唐朝散大夫孫思邈居士康阿祿山魏安豐王延明中山王熙竝以宗室博古學文俱立道場齊講相續以香汁和墨寫華嚴經一百部素書金字華嚴一部皆五香厨四寶函盛靜夜良辰清齊行道每放五色神光照耀臺宇衆皆共觀倍更發心釋德圓不知氏族天水人也少出家常以華嚴為業讀誦禪思用為恆准周遊講肆妙該宗極欽惟奧典希展殷誠遂修一淨園樹諸穀楮并種香草雜華洗濯入園溉灌香水楮生三載馥氣𣱦氳別造淨屋香泥壁地潔檀淨器浴具新衣匠人齊戒易服入出必盥嗽熏香剝楮取皮浸以沈水護淨造紙畢歲方成別築淨基更造新室乃至材梁椽瓦竝濯以香湯每事嚴潔堂中安施文柏牙座周布香華上懸繒寶蓋垂諸鈴珮雜以流蘇白檀紫沈以為經案并充筆管經生日受齊戒香湯三浴華冠淨服狀類天人將入經室必夾路焚香梵唄先引圓亦形服嚴淨執爐恭導散華供養方乃書寫圓跪運想住目傾心才寫數行每字皆放光明照於一院舉衆同見莫不悲感久之方歇復感神人執戟現形警衛圓與書生同見餘人則不覩焉又有青衣梵童子無何而至手執天華忽申供養前後靈感雜沓相仍迄經二歲書寫方畢盛以香函置諸寶帳安彼淨堂每申頂謁後因轉讀函發異光至於潔敬事絶今古若茲徵瑞蓋亦罕儔此經遽相付授至今五師後人入淨轉讀時有靈應今在西大原寺僧賢首處守護供養焉釋法誠俗姓焚氏雍州萬年縣人幼出家每以誦華嚴為業因遇慧超禪師隱居藍谷高山仰止竊有庶幾遂屏囂煩披誠請益後於寺南嶺造華嚴堂添潔中外方就抄寫其堂瓦及埿并用香水皆誠自𨀧踏莊嚴既畢乃潔淨圖畫七處八會之像又訪召當時工書之人弘文館學士張靜每事清淨敬寫此經誠亦親執香爐專精供養乃至一點一書住目傾心然施慧殷重雨紙酬錢五百便感瑞鳥形色非常銜華入堂徘徊旋繞下至經案復上香爐其經當寫未終後方更續更續之日鳥又飛來復造寶帳香函瑩飾周修自爾精心轉讀者多蒙感祐矣唐定州中山禪師釋修德者不知氏族苦節成性守道山林依華嚴經及起信論安心結業攝念修禪於永徽四年蹄誠方廣因發大心至精抄寫故別於淨院植楮樹凡歷三年兼之華藥灌以香水潔淨造紙復別築淨臺於上起屋召善書人媯州王恭別院齊戒洗浴淨衣焚香布華懸諸幡蓋禮經懺悔方升座焉下筆含香舉筆吐氣每日恆然精勤無怠禪師躬自入淨運想燒香筆翰之間并專心目因修若是迄于終始每寫一卷施縑十匹迄成一部總施六百餘段恭因發心并皆不受勞誠竭慮筋力都盡寫經才畢俄從永化德以經成設齊慶集大衆同請希心禮見禪師於衆前燒香散華嚴發弘誓願才開經藏放大光明周七十餘里照定州城城中士女并皆同見中山齊衆既覩希奇得未曾有投身宛轉悲嘷懺悔禪師又勒石寫涅槃法華經各一部初移入龕之際石涅槃法華并放光明滿十餘里舉衆咸覩感悟無涯處士孫思邈雍州永安人也神彩高遠儀貌魁梧身長七尺眉目疏朗然學該內外尤間醫藥陰陽術數星曆卜筮無不該通善養性好服食嘗服流珠丹及雲母紛肌膚光潤齒髮不虧耆老相傳云百餘歲視其形狀如年七八十許義寧元年高祖起義并州時邈在境內高祖知其宏達以禮待之命為軍頭任之四品固辭不受後歷遊諸處不恆所居隨時利物專以醫方為事有來請問無不拯療常勸道俗諸人寫華嚴經七百五十餘部上元儀鳳之年居長安萬年二縣之境嘗與人談話說齊魏人物及洛陽故都城中朝士并寺宇衆僧宛然目擊及將更問便即不言嘗撰古今名醫妙術號曰孫氏千金方凡六十卷備窮時用進上高祖高祖賞以束帛將授榮班苦辭不受時召入內旬月不出待詔禁中甚見優竉帝嘗縱容顧問修何功德為最佳耶邈對曰天皇何不讀華嚴經帝問何故邈曰天皇大人須讀大典譬如寶器函蓋宜相稱耳帝曰若論大經近者玄奘法師所譯大般若凡六百卷寧不大乎邈曰般若空宗乃華嚴經中枝條出矣帝深信之永淳前卒邈有子曰行真又名元一貞正該博強記洽聞深思法要回向一乘繼習父風亦以華嚴為業知名當代實為高信士焉雍州萬年縣人康阿祿山以調露二年五月一日染患遂亡至五日將殯載至墓所未及下車聞棺中有聲親里疑其重活剖棺視之祿山果蘇起載至家中自說被冥道誤追在閻羅王前總有三十五人共作一行其中有新豐果毅并祿山等十五人先有戒行同於王所披訴得還嘗時見東市藥行人阿容師師去調露元年患死為生時煮雞子與七百人入鑊湯地獄先識祿山遂憑屬曰吾第四子行證稍有仁慈君為我語之令寫華嚴經一部餘不相當若得為寫此七百人皆得解脫矣山後休健往新豐尋覓果毅相見悲喜猶若故交各說所由暗相符會又往東市賣藥阿家以容師之言具告行證證大悲感遂於西大原寺法藏師處請華嚴經令人書寫初自容師亡後家人寂無夢想至初寫經之夕合家同夢其父來喜暢無已到永隆元年八月莊嚴周畢請大德沙門慶經設供祿山爾日亦在會中乃見容師等七百鬼徒并來齊處禮敬三寶同跪僧前懺悔受戒事畢而去山既備矚冥司深信罪業遂屏絶人事永棄俗緣入太白終南專務栖隱後不知所終雜述第十華嚴經中佛名二卷菩薩名一卷右不知誰所集也但鳩集闕略未能備盡今沙門賢首更廣其塵頗為詳悉普禮法一十五拜右天台山智顗禪師所撰其拜首皆稱普禮末皆稱盧舍那佛其間具引寂滅道場等七處八會之名今江表盛行不復繁敘顗仍判華嚴為圓滿頓教云云華嚴齊記一卷右竟陵文宣王撰自齊梁已來每多方廣齊集皆依此修行也今益州宏法師亦以華嚴為志勸其士俗清信等或五十人或六十人同為福社人各誦華嚴一卷以同經部每十五日一家設齊嚴道場高座供主升座餘徒復位各誦其經畢而方散斯亦齊集之流也供養十門儀式右沙門智儼撰善財童子諸知識録右沙門彥琮撰華嚴旨歸一卷十門一說經處二說經時三說經佛四說經衆五說經義六說經教七顯經義八釋經意九辨經益十示經圓右於上十門各以十義解釋通并百門以顯經意遂令浩污之旨宛在目前具如彼釋沙門法藏所述華嚴三昧觀一卷十門右於上十門亦各以十義辨其所要務令修成普賢願行結金剛種作菩提因當來得預華嚴海會用於天台法華三昧觀諸修行者足為心鏡耳沙門法藏所述華嚴綱目一卷華嚴玄義章一卷華嚴教分記三卷右并大章疏之外隨人所問隨義而說録以成卷竝顯此經意法藏所述也華嚴翻梵語一卷舊經華嚴梵語及音義一卷新經右新舊二經所有梵語及新經難字悉具翻及音釋讀經之士實所要焉華嚴三寶禮十首右初禮云南無第一會菩提樹下師子座上盧舍那佛廣及十方遍周法界一切諸佛所說甚深果德法海并普賢菩薩等微塵數菩薩摩訶薩一切三寶後七會稱處名法名菩薩名別餘皆同上其第九禮中本經四十九萬八千八百偈華嚴經中三寶第十禮上本十大千界微塵數偈華嚴經中三寶并但稱說彼經佛法及普賢等可知華嚴讚禮十卷十首右初禮云至心歸命禮華嚴第一會樹王登寶位蓮界演華文聖衆眉間出神光發面門座中流慧海毛孔現慈雲一塵含法界九世念中分願共諸衆生同遊華藏界其第二會讚云龍堂信雲廣海印法流深輪光極空際名諦盡圓音賢初該六位傳首十方臨主伴恆文映帝網理難尋第三會云聚日臨山頂雲集滿虛空覺樹初無起天堂現金容隋州司法狄仁事調露二年高宗將封嵩嶽諸州宰牧各以六科舉人隋州刺史臨真公守節舉送東都榱寄主人宿於賣藥之室夜夢有人引行遊觀入一大室莫知邊際仰視但見渏井垂蓮圓泉䨱海金花方鏡殊勝莊嚴幡上皆有諸佛菩薩形像聞空中有聲曰此是花嚴道場也覺後慶懌兼倍願造大幡如夢所見還至隋州乃訪畫工將事修造時有安州范君及王生二人來共圖畫於興圓寺佛殿中藻繪成就長百餘尺所用丹青皆香水清潔遂感一瑞鵲每日飛來馴擾畫處曾無驚惕凡經旬半後欻不見咸以為畫士清淨至誠之所致文永十二年乙亥正月中旬之候聽聞五教章三十講暫經回栂尾高山寺之處自彼寺住侶惠日房辨清之手借得華嚴傳五卷點本之間喜悅銘肝之餘下向南都之後誂能書之輩令書寫此傳之內當卷者表誂當寺下野公膽惠令書寫之假名并姓誂同伴與伴與公慶性令付之裏書者同年四月晦日申時於東大寺尊勝院新學問所手自書寫之畢已及八旬之齡雖倦三餘之勤為備生前之思出愍勵老後之修學後學披見之時可哀其志矣此假名姓裏書者土御門大納言入道顯定卿三所記録也即以彼禪門自筆之點本寫之可為無雙之證本也建治元年乙亥六月五日午時於當院家新彌勒堂合寫本等奉讀之畢願以此五卷披讀之微功必為彼三會得脫之良因耳前權僧正宗性聽衆良曉得業慶實法師談義之後即於當院家新學問所為散後日之不審委記當時之次第而已右筆華嚴宗末葉沙門釋宗性年齡七十四夏六十二抑此料紙者去文永三年之曆暮秋九月之候後嵯峨天皇所降賜也不慮之朝恩面目頓餘身之間漸漸取出之以寫如此要書以資前院之後菩提以祈法皇之御得脫冥衆必垂哀愍所願畢得成就矣
