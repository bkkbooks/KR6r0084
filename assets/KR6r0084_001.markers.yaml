  - {type: variant, offset: 6380, length: 344, content: '文永十二年乙亥正月中旬之候。為聽聞五教章三十講。暫拪息栂尾高山寺之處。自彼寺住侶惠日房辨清之手。借得華嚴傳五卷點本之間。喜悅銘肝之餘。下向南都之後。誂能書之輩令書寫。此傳之內。當卷者。表誂中川玄蓮房。裏託春日山麓四恩院願忍房覺玄。令書寫之彼院家院主如圓房朝海令付假名并指姓等。此假名姓裏書者。土御門大納言入道顯定卿之所記錄也。即以彼禪門自筆點本寫之可為無雙之證本也而已。

      文永十二年也。

      建治元年乙亥五月二十六日未時於當院尊勝院新彌勒堂。合寫本等奉讀之畢。前權僧正宗性。聽眾。良曉得業。慶實法師。賢性法師。談義之後。即於當院家新學問所。為後覽記之。古筆華嚴宗未學愚老僧宗性。年齡七十四。夏󰺢六十二。

      抑此料紙者去文永三年之曆暮九月之候。後嵯峨天皇所降賜也。不慮之朝恩。面目頓餘身之間。漸漸取出之。以寫如此要書。以資前院之御菩提。以祈法皇之御得脫。冥眾必垂哀愍。所願畢得成就矣。', 甲: ''}
