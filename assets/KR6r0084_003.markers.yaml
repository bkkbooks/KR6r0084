  - {type: variant, offset: 3983, length: 310, content: '文永十二年乙亥正月中旬之候。為聽聞五教章三十講。暫栖息栂尾高山寺之處。自彼寺住侶惠日房辨清之手。借得華嚴經五卷。點本之間。喜悅銘肝之餘。下向南都之後。誂能書之輩令書寫。此傳之內。當卷者。表誂中川淨覺房朝酉。裏誂春日山麓四恩院願忍房覺玄。令書寫之。彼院家院主如圓房朝海令付假名并指姓畢。此假名姓裏書者。土御門大納言入道顯定卿之所記錄也。即以彼禪門自筆之點本寫之。可為無雙之證本也而已。

      建治元年乙亥六月一日末時於東大寺尊勝院新彌勒堂。令寫本等奉讀之畢。前權僧正宗性。聽眾。良曉得業。慶實法師。談義之後。即於當院家新學問所。為後覽記之。右筆華嚴宗末葉半僧宗性。年齡七十四。夏臘六十二。

      抑此料紙者。去文永三年之曆暮秋九月之候。後嵯峨天皇所降賜也。不慮之朝恩面目頓餘身之間。漸漸取出之。以寫如此之要書耳。', 甲: ''}
