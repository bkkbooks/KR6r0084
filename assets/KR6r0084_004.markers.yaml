  - {type: variant, offset: 7543, length: 343, content: '文永十二年乙亥正月中旬之候。為聽聞五教章三十講。暫栖息栂尾高山寺之處。自彼寺住侶惠日房辨清之手。借得華嚴傳五卷。點本之間。喜悅銘肝之餘。下向南都之後。誂能書之輩令書寫。此傳之內。當卷者。表誂當寺下野公瞻惠令書寫之。假名并姓誂同宿大夫之慶實令付之。裏書者。主同年四月二十五日酉時於東大寺尊勝院新學問所手自書寫之畢。及老耄之間雖眼腫手振。猶勵拾螢之勤。懇記飛鳥之路耳。此假名姓裏書者。土御門大納言入道顯定卿之所記錄也。即以彼禪門自筆之點本寫之。可為無雙之證本也。

      建治元年乙亥六月四日午時於同院家新彌勒堂。合寫本等奉讀之畢。前權僧正宗性。聽眾。良曉得業。慶實法師。談義之後。即於當院家新學問所。為後覽記之。右筆華嚴宗末葉行道僧宗性。年齡七十四。夏臘六十二抑此料紙者。去文永三年之曆暮秋九月之候。後嵯峨天皇所降賜也。不慮之朝恩。面目頓餘身之間。漸漸取出之。以寫如此之要書寫。', 甲: ''}
