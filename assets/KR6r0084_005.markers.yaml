  - {type: variant, offset: 2852, length: 412, content: '文永十二年乙亥正月中旬之候。聽聞五教章三十講。暫經迴栂尾高山寺之處。自彼寺住侶惠日房辨清之手。借得華嚴傳五卷。點本之間。喜悅銘肝之餘。下向南都之後。誂能書之輩令書寫。此傳之內。當卷者。表誂當寺下野公膽惠令書寫之。假名并姓。誂同伴與伴與公慶性令付之。裏書者。同年四月晦日申時於東大寺尊勝院新學問所手自書寫之畢。已及八旬之齡。雖倦三餘之勤。為備生前之思出。愍勵老後之修學。後學披見之時。可哀其志矣。此假名姓裏書者。土御門大納言入道顯定卿三所記錄也。即以彼禪門自筆之點本寫之。可為無雙之證本也。

      建治元年乙亥六月五日午時於當院家新彌勒堂。合寫本等奉讀之畢。願以此五卷披讀之微功。必為彼三會得脫之良因耳。前權僧正宗性。聽眾。良曉得業。慶實法師。談義之後。即於當院家新學問所。為散後日之不審。委記當時之次第而已。右筆。華嚴宗末葉沙門釋宗性。年齡七十四。夏󰺢六十二。

      抑此料紙者。去文永三年之曆暮秋九月之候。後嵯峨天皇所降賜也。不慮之朝恩。面目頓餘身之間。漸漸取出之。以寫如此要書。以資前院之後菩提。以祈法皇之御得脫。冥眾必垂哀愍。所願畢得成就矣。', 甲: ''}
