  - {type: variant, offset: 2641, length: 211, content: 隋州司法狄仁󱡺事。調露二年。高宗將封嵩嶽諸州宰牧。各以六科舉人。隋州刺史臨真公。守節舉送。東都榱寄主人。宿於賣藥之室。夜夢有人引行遊觀入一大室。莫知邊際。仰視但見渏井垂蓮。圓泉䨱海。金花方鏡。殊勝莊嚴。幡上皆有諸佛菩薩形像。聞空中有聲曰。此是花嚴道場也。覺後慶懌兼倍。願造大幡。如夢所見。還至隋州。乃訪畫工。將事修造時。有安州范君及王生二人。來共圖畫。於興圓寺佛殿中。藻【CB】，𮒌【大】藻𮒌繪成就。長百餘尺。所用丹青。皆香水清潔。遂感一瑞鵲。每日飛來。馴擾畫處。曾無驚惕。凡經旬半後。欻不見。咸以為畫士清淨至誠之所致, 甲: ''}
