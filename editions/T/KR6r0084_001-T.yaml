body:
  text: 京兆崇福寺僧沙門法藏集部類隱顯傳譯支流論釋講解諷誦轉讀書寫雜述部類第一案此經是毘盧遮那佛法界身雲在蓮華藏莊嚴世界海於海印三昧內與普賢等海會聖眾為大菩薩之所說也凡一言一義一品一會皆遍十方虛空法界及一一微塵毛端剎土盡因陀羅網微細世界窮前後際一切劫海及一一念具無邊劫常說普說無有休息唯是無盡陀羅尼力所持非是翰墨之所能記此乃圓滿法輪稱法界之談耳但以本不離迹是以處寄人天時臨二七以迹不離本九會即遍十方二七該于十世以本迹無二令無限即限限即無限如此經中海雲比丘所持普眼修多羅以須彌山聚筆大海水墨書一一品不可窮盡又如真諦三藏云西域傳記說龍樹菩薩往龍宮見此華嚴大不思議解脫經有三本上本有十三千大千世界微塵數偈四天下微塵數品中本有四十九萬八千八百偈一千二百品下本有十萬偈四十八品其上中二本及普眼等竝非凡力所持隱而不傳下本見流天竺蓋由機悟不同所聞宜異故也是以文殊普賢親承具教天親龍樹僅覩遺筌小聖同坐而不聞大士異趣而先覺聖教之行藏器局之優劣斷可知矣又為佛去世遠眾生報劣色力念慧悉皆減損於此下本無力具受遂隨力隨樂分寫受持或具十萬大本猶在或三萬六千如晉朝所譯或餘四萬此周朝所翻或分其品會別成部帙如支流所辨或漸湮滅不聞其名皆由器致耳亦如曦陽麗天明無優劣但眼淨具瞻目眩稍味盲絕不見日豈非朗耶今此亦爾廣略在器本法無虧隱顯第二依文殊般涅槃經佛去世後四百五十年文殊師利猶在世間依智度論諸大乘經多是文殊師利之所結集此經則是文殊所結佛初去後賢聖隨隱異道競興乏大乘器攝此經在海龍王宮六百餘年未傳於世龍樹菩薩入龍宮日見此淵府誦之在心將出傳授因茲流布開皇三寶錄云昔于闐東南二千餘里有遮拘槃國彼王歷葉敬重大乘諸國名僧入其境者竝皆試練若小乘學則遣不留摩訶衍人請停供養王宮內自有華嚴摩訶般若大集等經竝十萬偈王躬受持親執戶籥轉讀則開香華供養又於道場內種種莊嚴眾寶備具并懸諸雜幡時非時果誘諸小王令入禮拜又此國東南可二十餘里有山甚嶮其內置華嚴大集方等寶積楞伽方廣舍利弗陀羅尼華聚陀羅尼都薩羅藏摩訶般若大雲等凡一十二部皆十萬偈國法相傳防護守掌有東晉沙門支法領者風範慷慨邈然懷拔萃之志好樂大乘忘寢與食乃裹糧杖策殉茲形命於彼精求得華嚴前分三萬六千偈齎來至此即晉朝所譯是也今大周于闐所進逾四萬頌於第一會所說華藏世界舊譯闕略講解無由今文竝具爛然可領其十定一會舊經有問無答今本照然備具是以前有七處八會今七處九會雖望百千而未備然四萬之理亦無遺且龍樹誦具本以上昇法領獲僅半以東度雖凡聖不一而弘法無二但以域壤有中邊慧解有深淺遂使數萬里間見聞懸隔闕乎大半可不傷哉大智度論云不思議經有十萬偈攝大乘論云有百千偈名百千經釋論云即華嚴經十萬偈為百千也又涅槃經名此經為雜華然百千舉數而標目雜華即相以彰名舉數者失其源即相者遣其主不思議則推宗有在直造其庭佛華嚴則以人標法曲詳其致四名之中後二為得矣傳譯第三晉京師道場寺佛馱跋陀羅唐魏國西寺地婆訶羅大周神都佛授記寺實叉難陀晉京師道場寺佛馱跋陀羅此云覺賢本姓釋氏迦維羅衛人甘露飯王之苗裔也祖達摩提婆此云法天甞遊天竺因以居焉父達摩修利耶此云法日賢三歲偏孤八歲喪母為外氏所養從祖鳩摩利聞其聰敏憐其孤幼乃迎還度為沙彌至年十七與同學數人俱以習誦為業眾皆用功一月賢一日當之師歎曰賢一日敵三十夫也及受具戒修業精懃博學群經多所綜達少以禪律馳名常與同學僧伽達多遊處積年達多雖服其才德而未測其深淺也後於密室閉戶坐禪忽見賢來驚問所從答曰暫上兜率致敬彌勒言訖便隱達多方知是聖人也後屢見賢神變乃至誠方知得不還果常欲遊方弘化備觀風俗會有秦沙門智嚴至罽賓訪問彼國僧眾誰能流化東土咸云有佛馱跋陀羅者本生天竺那可梨城族姓相承世遵道學聰明博贍位行難測童稚出家已通經論受業於大禪師佛陀大仙佛陀大仙時亦在罽賓聞嚴求人乃謂嚴曰可以振維僧徒宣授禪法者佛馱跋陀其人也嚴既要請苦到賢遂默而許焉於是辭師裹糧東逝涉路三載寒暑備更乃有層巖重蔭連凍千里清旭啟旦則崎嶇陵嶮潛晷告昏則枕廗氷雪飛梯懸蹬側足傍踐援繩挂索仰接雲岸自氷雪之外艱途萬數糧用中竭分粒繼飡爰憑聖祐僅而得濟既度葱嶺略經六國國主矜其遠化竝欣懷資俸至交趾附舶循海而行經一嶋下賢舉手指山曰可泊於此舶主曰客行惜日調風難遇不可停也遂行二百餘里忽值返風吹舶還至前島船人各悟其神咸師事之一稟其進止後遇便風同侶皆發賢曰不可動舶主乃止既而先發者一時覆敗後於中夜忽令眾船俱發無肯從者賢自起收纜一船獨發俄爾賊至留者悉被抄害次之達青州東萊郡聞鳩摩羅什在長安欣然而來則秦弘始十年四月也什大歡悅共論法相振發玄微多所啟悟因謂什曰君所解不出人意而致高名耶什曰吾年老故爾何必能稱美談什每有疑義必共論決沙門道才曇暢僧叡慧觀等六百人俱稟禪訓其所指授莫非真要自遺法東遷四百餘年開發之深無若此也其言理辨物必求諸中不苟適當時不求勝人之口其所得則辨明無遺其所不知則時闕如也秦太子泓欲聞賢說法乃要命群僧進論東宮羅什與賢數番往復文多不載秦主姚興專志佛法三千餘僧竝預宮闕盛修人事唯賢守靜不與眾同後語弟子云我昨見本鄉有五舶俱發後經歲許遇外舶至既而訊訪果是天竺五舶先所見者也傾境聞之競來禮事其有奉施悉皆不受持鉢分衛無論豪賤甞與弟子慧觀次第乞食至陳郡袁豹素不敬信待之甚薄未飽辭退豹曰似未足且復小留賢曰檀越施心有限故令所設已罄豹即呼左右益飯飯果盡豹大慚既而問慧觀曰此沙門何如人觀曰德量高邈非凡所測豹深歎異之賢儀軌率素不同華俗而志韻清遠雅有深致法師僧弼與沙門寶材書曰鬪場禪師甚有大心便是天竺主何風流人也到義熙十四年吳郡內史孟顗右衛將軍褚叔度則請賢出此經乃手執梵文共沙門法業慧嚴等百有餘人於道場寺譯出詮定文旨會通方言妙得經意故道場寺猶有華嚴堂焉大教流傳蓋其力也初譯經時堂前池內每有二青衣從池中出奉以香華舉眾皆見亦有神祇營衛左右賢以元嘉六年卒春秋七十有一矣手屈三指明得阿那含果焉中天竺國三藏法師地婆訶羅唐言日照婆羅門種幼而出家住摩訶菩提及那蘭陀寺三藏風儀溫雅神機朗俊負笈從師研精累歲器成琱玉學擅青藍承沙門玄弉傳教東歸思慕玄門留情振旦既而占風聖代杖錫來儀載闡上乘助光神化爰以永隆初歲言屆京師高宗弘顯釋門克隆遺寄乃詔緇徒龍象帝邑英髦道誠律師薄塵法師十大德等於魏國西寺翻譯經論之次時有賢首法師先以華嚴為業每慨斯經闕而未備往就問之云齎第八會文今來至此賢首遂與三藏對挍遂獲善財善知識天主光等十有餘人遂請譯新文以補舊闕沙門復禮執筆沙門慧智譯語更譯密嚴等經論十有餘部合二十四卷竝皇大后御製序文深加讚述今見流行於代焉三藏辭鄉之日其母尚存無忘鞠育之恩恒思顧復之報遂詣神都抗表天闕乞還舊國初未之許再三固請有勅從之京師諸德造緋羅珠寶袈裟附供菩提樹像勅錫神鐘一口及請幡像供具遵途以垂拱三年十二月二十七日體甚康体告門人曰吾當逝矣右脇而臥無疾而終於神都魏國東寺會葬者數千萬人聖母聞之深加悲悼施絹千匹以充殯禮道俗悲慕如喪所親香華輦輿瘞於龍門山陽伊水之左門人修理靈龕加飾重閣因起精廬其側掃灑供養焉後因梁王所奏請置伽藍勅內注名為香山寺危樓切漢飛閣凌雲石像七龕浮圖八角駕親遊幸具題詩讚云爾大周神都佛授記寺沙門實叉難陀唐云喜覺于闐國人智度弘曠利物為心善大小乘兼異學論天后明揚佛日敬重大乘以華嚴舊經處會未備遠聞于闐有斯梵本發使求訪并請譯人實叉與經同臻帝闕以天后證聖元年乙未於東都大內遍空寺譯華嚴經天后親臨法座煥發序文自運仙毫首題名品南印度沙門菩提流志沙門義淨同宣梵文後付沙門復禮法藏等於佛授記寺譯至聖曆二年己亥功畢又至久視元年庚子於三陽宮內譯大乘入楞伽經及於西京清禪寺東都佛授記寺譯文殊授記等經前後總譯一十九都沙門波崙玄執等筆受沙門複禮綴文沙門法寶弘景等證義太子中舍人賈膺福監護至長安四年實叉緣母年老請歸覲省表書再上方蒙允許勅御史崔嗣光送至于闐後和帝龍興重暉佛日勅再徵召方屆帝城以景龍二年達于茲土帝屈萬乘之尊親迎於開遠門外京城緇侶備諸幢幡逆路導引仍裝飾青象令乘入城勅於大薦福寺安置未遑翻譯遘疾彌留以景雲元年十月十二日右脇疊足終于大薦福寺春秋五十有九緇徒悲噎歎法棟之遽摧俗侶哀號恨群生之失導有詔聽依外國法葬以十一月十二日於開遠門外古燃燈臺焚之薪盡火滅其舌猶存斯是弘法之嘉瑞也至十二月十三日本國門人悲智勅使哥舒道元送其餘骸及斯靈舌遂歸于闐起塔供養後人復於焚屍之所起七層塔焉支流第四兜沙經一卷是華嚴名號品後漢月支國沙門支讖譯菩薩本業經一卷或云淨行品經是淨行品吳月支國沙門清信士支謙譯諸菩薩求佛本業經一卷亦是淨行品也西晉清信士聶道真譯菩薩本願行品經一卷亦是淨行品也亦是道真重譯右件經竝是此經第二會中出菩薩十住經一卷是十住品東晉西域沙門祇多密晉言訶支譯菩薩十住經一卷是十住品西晉沙門竺法護譯菩薩十道地經一卷似十住品聶道真譯十住斷結經十卷非十住品亦非十地品以名同恐誤附也後秦涼州沙門竺佛念譯右件經竝是此經第三會中出十地斷經十卷是十地品後秦沙門竺佛念譯十住經十二卷是十地品西晉聶道真譯菩薩十地經一卷似十地品十住品也西晉竺法護譯大方廣十地經一卷似十地十住品也西域沙門吉迦夜譯十地經一卷似十地十住品東晉訶支譯十住經四卷具是十地品後秦羅什共罽賓三藏佛陀耶舍秦言覺明譯漸備一切智德經五卷具是十地品西晉月支國沙門曇摩羅晉言法護譯菩薩初地經一卷似初地西晉清信士聶道真譯右件經竝是此經第六會中出等目菩薩經二卷是十定品竺法護譯顯無邊佛土功德經一卷是壽命品唐三藏法師玄弉譯如來興現經四卷是性起品無重頌偈仍將十忍品次後編之亦不題也西晉元康年竺法護譯如來興現經一卷與法護譯題彼品名廣略為名西晉沙門白法祖譯大方廣如來性起經二卷序分是名號品現正說即是性起品失譯大方廣如來性起微密藏經二卷與前同本異譯西晉元康年出不現譯人右件經竝是此經第七會中出度世經六卷是離世間品西晉法護譯普賢菩薩答難二千經是離世間品吳代失譯右件經竝是此經第八會中出羅摩伽經三卷是入法界品文不足西秦沙門聖賢或云堅公譯又魏安法賢譯一本亦三卷又北涼曇無讖譯一本一卷成右件經竝是此經第九會中出大方廣華嚴入如來不思議境界經二卷或無大方廣字右是隋北天竺三藏闍那崛多隋言智德譯或云共笈多譯度諸佛境界智嚴經一卷梁扶南沙門僧伽婆羅梁言僧養亦云僧鎧譯度諸佛境界智光嚴經一卷失譯大方廣入如來不思議境界經二卷大周于闐沙門實叉難陀譯右件四經同本異譯竝云在普光法堂說大方廣佛華嚴佛境界分一卷唐載初年于闐三藏提雲般若譯大方廣佛境界經一卷大周于闐三藏實叉難陀譯右件二經同本異譯菩提樹下說大方廣普賢所說經一卷說佛身內有不可說世界事大周實叉難陀譯大方廣佛華嚴修慈分經一卷唐載初年提雲般若譯右已上不思議境界等經現本華嚴內雖無此等品然勘梵本竝皆具有固是此經別行品會為梵品不題品次不編入大部信力入印法門經五卷元魏南天竺三藏曇摩流支魏云希法譯右件經古德相傳云是華嚴別品詳其文句始終總無華嚴流類近勘梵本亦無此品請後人詳究鈔華嚴經一十五卷右昔南齊司徒竟陵文宣王蕭子良者天機秀發宅心真境望億劫而長驅凌千歲而獨上若闡揚經教開弘福業莫不出自神裏行之身命永明八年感夢東方天王如來冥資聖授始撰淨住之法又夢沙門自稱智勝引對佛前教其轉讀因傳經唄之則又㢡率朝賢啟龍華三會之福祇勸士庶受菩薩三聚之戒竝祥瑞欝蒸難得而言者也加以閱彼龍宮仞斯象跡毘贊玄化住持覺運凡鈔如上等諸經三百餘卷撰弘益文翰一百餘卷自手書經七十餘卷其所撰內有華嚴瓔珞經二卷標出世之術華嚴齊記一卷敘法會之致竝可以垂鏡來葉不刊之勝躅也華嚴十惡經一卷右隋學士費長房三寶錄注入偽妄恐後賢濫齎故此附出論釋第五婆羅頗密多三藏云西國相傳龍樹從龍宮將經出已遂造大不思議論亦十萬頌釋此經既冥機未啟不測其指歸也十住毘婆沙論一十六卷龍樹所造釋十地品義後秦耶舍三藏口誦其文共羅什法師譯出釋十地品內至第二地餘文以耶舍不誦遂闕解釋相傳其論是大不思議論中一分也十住論一十卷龍樹所造後秦弘始年中羅什法師譯十地論一十二卷婆藪般豆菩薩此云天親於山中釋十地品疊本經文依次消解菩薩初造論成感經放光明山振地動其國主臣民俱來慶賀歎為希有瑞也廣如本傳至後魏有北天竺三藏菩提留支魏云希覺來此翻譯初譯之日宣武皇帝親自筆受一日又曰中天竺三藏勒那摩提魏云寶意來此共流支於洛水南北各譯一本其後僧統慧光請二賢對詳挍同異參成一本又別傳云天親造華嚴經論既未獲具本此十地或是隨得翻之又云無著菩薩往來都率彌勒菩薩教以華嚴等經自彼宣流亦其力也近問西來三藏梵僧皆云金剛軍菩薩造十地釋論有一萬二千頌翻可成三十餘卷又堅慧菩薩亦造略釋竝未傳此土于闐國見有其本實叉歸日已附信索如得亦擬翻出又瑜伽菩薩地中住品內廣寫此經十地品文次第兼釋良以此經三賢十聖位分最廣既為諸部龜鏡是以造釋者非一耳華嚴論六百卷昔北齊大和初年第三王子於清涼山求文殊師利菩薩燒身供養其王子有閹官劉謙之既自慨形餘又覩王子焚軀之事乃奏乞入山修道有勅許焉遂齎此經一部晝夜精懃禮懺讀誦并心祈妙德以希冥祐絕粒飲水垂三七日形氣雖微而丹抱彌著忽感髮鬢盡生復丈夫相神彩超悟洞斯幽指於是覃思研精爰造前論始終綸綜還以奏聞高祖信敬由來更增常日華嚴一經於斯轉盛隋淨影寺慧遠法師晚年造此經疏至廻向品忽覺心痛視之乃見當心毛孔流血外現又夢持鎌登大山次第芟剪至半力竭不復能起覺已謂門人曰吾夢此疏必不成於是而止相州休法師聽華嚴五十餘遍研諷文理轉加昏漠乃自喻曰斯固上聖至言豈下凡所抑度哉詳二賢博贍宏富振古罕儔於此陶埏莫能窮照而謙之尋閱未盡數旬注茲鴻論何其壯哉蓋是大聖冥傳不足多怪案此經菩薩住處品云東北有菩薩住處名清涼山現有菩薩名文殊師利與一萬菩薩常住說法故今此山下有清涼府山之南面小峯有清涼寺一名五臺山以五山最高其上竝不生林木事同積土故謂之臺也山周迴四百餘里東連恒岳中臺上有大華池湛然清徹蒸多徵感又有精屋石塔北臺上有鐵浮圖二并舍利及文殊形像中臺東南下三十餘里有大浮寺漢明所立既年代久遠荒涼彌甚遺基餘趾尚能可識中有東西二堂像設存焉前在華薗二三頃綺繢交錯百種千名爛同舒錦赫如霞照至於超常絕聽之類世所希聞者至七月十五日萬品齊發次北八九里是前王子捨身之地現有表塔昔北齊之日大敝玄門於此山中置伽藍二百餘所又割恒定等八洲之稅以供山眾衣藥之資焉今神居寶地往往而在案別傳云文殊師利菩薩常於彼講華嚴經故自古以來迄乎唐運西域梵僧時有不遠數萬里而就茲頂謁者及此土道俗亦塵軌相接或遇神僧聖眾仙閣珍臺靈光暐曄妙香芬馥空鐘自響寶偈遙聞倏忽俄頃抑揚千變如清涼山記具之山去京一千六百里代州之界然地居邊壤特甚寒烈故四月已前七月以後堅氷積雪暠皓彌布自非盛夏之日無由登踐勗哉懷道之士可不庶幾一往乎華嚴論一百卷後魏沙門釋靈辨所造也法師大原晉陽人也宿植妙因久種勝善幼而入道長而拔俗常讀大乘經留心菩薩行及見華嚴偏加昧甞乃頂戴此經入清涼山清涼寺求文殊師利菩薩哀護攝受冀於此經義解開發則頂戴行道遂歷一年足破血流肉盡骨現又膝步懇策誓希冥感遂聞一人謂之曰汝止行道思惟此經於是披卷豁然大悟時後魏熙平元年歲次大梁正月起筆於清涼寺敬造華嚴論演義釋文窮微洞奧至二年初徙居玄兌山嵩巖寺注釋同前時孝明帝靈大后胡氏重道欽人旨請就闕法師辭疾未見至夏首重命固請既辭不獲免至十六日進入東柏堂尋遷式乾殿後居徽音殿緝論無輟至神龜元年夏詔曰大法弘廣敷演待人今徽音殿修論法師靈辨德器淵雅早傳令聞可延屈趣宣光殿講大品般若於是四部交歡十方延慶講訖勅侍中大傅清河王允懌安置法師式乾殿樓上準前修論夏則講華嚴冬則講大品法師與弟子靈源候時緝綴忘寢與食神龜三年秋九月其功乃畢略經廣論凡一百卷首尾五年成就十帙後屬時多疊法音中歇法師息講全真避時養道以正光三年正月八日在融覺寺遷神化往時年四十有六於是孝明皇帝勅曰其論是此土菩薩所造付一切經藏則上目錄分布流行弟子道昶靈源曇現等慨先師夙逝痛靈藉之將掩乃與清信君子敬寫淨本流布道俗此論雖盛傳汾晉未流京洛長安碩德每有延望永淳二年有至相寺沙門釋通賢及居士玄爽房玄德寺竝業此經留心讚仰遂結志同遊詣清涼山祈禮文殊聖者因至并州童子寺見此論本乃慇懃固請方蒙傳授持至京師帝輦髦彥莫不驚挊遂繕寫流通焉文永十二年乙亥正月中旬之候為聽聞五教章三十講暫拪息栂尾高山寺之處自彼寺住侶惠日房辨清之手借得華嚴傳五卷點本之間喜悅銘肝之餘下向南都之後誂能書之輩令書寫此傳之內當卷者表誂中川玄蓮房裏託春日山麓四恩院願忍房覺玄令書寫之彼院家院主如圓房朝海令付假名并指姓等此假名姓裏書者土御門大納言入道顯定卿之所記錄也即以彼禪門自筆點本寫之可為無雙之證本也而已文永十二年也建治元年乙亥五月二十六日未時於當院尊勝院新彌勒堂合寫本等奉讀之畢前權僧正宗性聽眾良曉得業慶實法師賢性法師談義之後即於當院家新學問所為後覽記之古筆華嚴宗未學愚老僧宗性年齡七十四夏六十二抑此料紙者去文永三年之曆暮九月之候後嵯峨天皇所降賜也不慮之朝恩面目頓餘身之間漸漸取出之以寫如此要書以資前院之御菩提以祈法皇之御得脫冥眾必垂哀愍所願畢得成就矣
